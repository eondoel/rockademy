<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academia Multiverso 🌌</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌌</text></svg>">
</head>
<body>
  <header id="header">
    <div class="header-row">
      <button class="logo" id="btn-home" title="Ir al inicio">🌌 <span>Academia Multiverso</span></button>
      <div class="streak" id="streak" title="Días seguidos entrenando">🔥 0</div>
    </div>
    <div class="header-row stats">
      <div class="rank" id="rank">🌱 Aldeano Curioso</div>
      <div class="power" id="power" title="Tu nivel de poder">⚡ 0</div>
    </div>
    <div class="xpbar"><div class="xpbar-fill" id="xpfill"></div></div>
  </header>

  <main id="app"></main>

  <div id="modal-root"></div>

  <script src="js/core.js"></script>
  <script src="js/english.js"></script>
  <script src="js/math.js"></script>
  <script src="js/tech.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
